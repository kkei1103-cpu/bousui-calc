/* =========================================================
   カテゴリ定義
   ========================================================= */
const catMap={
  世界:'world',科学:'science',スポーツ:'sports',テクノロジー:'tech',
  ゲーム:'game',エンタメ:'entame','SNS・動画':'sns',音楽:'music'
};
const emojiMap={
  世界:'🌍',科学:'🔬',スポーツ:'⚽',テクノロジー:'💻',
  ゲーム:'🎮',エンタメ:'🎬','SNS・動画':'📱',音楽:'🎵'
};
const SITE='https://vocal-croquembouche-b264a1.netlify.app';
let currentTab='すべて';

function setTab(el,t){
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  el.classList.add('active');
  currentTab=t;
  render();
}

function render(){
  const grid=document.getElementById('grid');
  const items=currentTab==='すべて'?NEWS:NEWS.filter(c=>c.category===currentTab);
  if(!items.length){
    grid.innerHTML='<p style="text-align:center;padding:2.5rem;color:#888">このカテゴリのニュースはまだありません 😢</p>';
    return;
  }
  grid.innerHTML=items.map((c,i)=>`
    <article class="card" itemscope itemtype="https://schema.org/NewsArticle">
      <div class="card-img">${ILLUSTRATIONS[c.illust]||''}</div>
      <div class="card-body">
        <div class="card-top">
          <div class="cat-icon">${emojiMap[c.category]||'📌'}</div>
          <div>
            <span class="pill cat-${catMap[c.category]||'world'}">${c.category}</span>
            <h2 class="title" itemprop="headline">${c.title}</h2>
          </div>
        </div>
        <p class="summary" itemprop="description">${c.summary}</p>
        <div class="detail" id="d${i}">${c.explain}</div>
        <div class="word-box" id="w${i}">
          <div class="word-box-title">📖 キーワード解説</div>
          ${(c.words||[]).map(w=>`
            <div class="word-item">
              <span class="w-term">${w.term}</span>
              <span class="w-read">（${w.read}）</span>
              <span class="w-def">＝ ${w.def}</span>
            </div>`).join('')}
        </div>
        <div class="trivia-box" id="t${i}">
          <div class="trivia-label">⭐ 友達に話したくなる豆知識</div>
          ${(c.trivia||[]).map(t=>`<p class="trivia-item">${t}</p>`).join('')}
        </div>
        <div class="card-footer">
          <button class="more-btn" onclick="toggleDetail(${i},this)">詳しく見る ▼</button>
          <button class="word-btn" onclick="toggleWord(${i},this)">📖 キーワード</button>
          <button class="trivia-btn" onclick="toggleTrivia(${i},this)">⭐ 豆知識</button>
          <div class="btn-row">
            <a class="detail-link" href="/articles/${c.slug}.html">記事を読む</a>
            <button class="share-btn" onclick="doShare('${c.title.replace(/'/g,"\\'").replace(/<[^>]+>/g,'')}','${c.slug}')">📤 シェア</button>
          </div>
        </div>
        <div class="source-line">📎 出典：${c.source}</div>
      </div>
    </article>`).join('');
}

function toggleDetail(i,btn){
  const el=document.getElementById('d'+i);
  const open=el.classList.toggle('open');
  btn.textContent=open?'閉じる ▲':'詳しく見る ▼';
}
function toggleWord(i,btn){
  const el=document.getElementById('w'+i);
  const open=el.classList.toggle('open');
  btn.textContent=open?'📖 閉じる':'📖 キーワード';
}
function toggleTrivia(i,btn){
  const el=document.getElementById('t'+i);
  const open=el.classList.toggle('open');
  btn.textContent=open?'⭐ 閉じる':'⭐ 豆知識';
}
function doShare(title,slug){
  const url=SITE+'/articles/'+slug+'.html';
  const text='「'+title+'」\nきょうのニュースで読んだよ！';
  if(navigator.share)navigator.share({title,text,url}).catch(()=>{});
  else window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(text)+'&url='+encodeURIComponent(url),'_blank','noopener');
}

render();
</script>
