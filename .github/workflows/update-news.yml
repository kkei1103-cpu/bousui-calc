name: ニュース自動更新 + SEO

on:
  schedule:
    - cron: '0 21 * * *'   # 日本時間 6:00
    - cron: '0 9 * * *'    # 日本時間 18:00
  workflow_dispatch:

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - name: ニュース生成
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: node scripts/generate-news.js
      - name: Netlify デプロイ
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: npx netlify-cli deploy --prod --dir=public
      - name: Google に更新を通知
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
        run: |
          curl -s "https://www.google.com/ping?sitemap=${SITE_URL}/sitemap.xml"
          echo "✅ Googleにサイトマップを通知しました"
